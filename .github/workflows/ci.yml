name: ci

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-test-and-data:
    runs-on: ubuntu-latest

    steps:
      # -------------------------
      # Checkout repo
      # -------------------------
      - name: Checkout
        uses: actions/checkout@v4

      # -------------------------
      # Setup Python
      # -------------------------
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # -------------------------
      # Install dependencies
      # -------------------------
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # -------------------------
      # Run tests
      # -------------------------
      - name: Run tests
        run: |
          export PYTHONPATH=$PYTHONPATH:.
          pytest -q

      # -------------------------
      # Run pipeline (generate data)
      # -------------------------
      - name: Run pipeline
        run: |
          python pipeline.py

      # -------------------------
      # Check generated files (debug)
      # -------------------------
      - name: List generated files
        run: |
          echo "Generated files:"
          ls -R data || echo "No data folder found"

      # -------------------------
      # Commit processed data back to repo
      # -------------------------
      - name: Commit processed data
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add data/processed/

          git diff --cached --quiet && echo "No changes to commit" || git commit -m "Auto-update processed data"

          git push
